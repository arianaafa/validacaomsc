services:
  postgres:
    image: postgres:16-alpine
    container_name: validamsc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-validamsc}
      POSTGRES_USER: ${POSTGRES_USER:-msc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semsenha}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msc_user} -d ${POSTGRES_DB:-validamsc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: validamsc-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-validamsc}
      DB_USERNAME: ${POSTGRES_USER:-msc_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-semsenha}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: validamsc-nginx
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docs/openapi:/var/www/docs/openapi:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  frontend:
    image: node:22-alpine
    container_name: validamsc-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && (pkill -f 'node.*vite' 2>/dev/null || true) && sleep 1 && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  postgres_data:
  frontend_node_modules:

# Reservado para parâmetros reutilizáveis de query/path.

Page:
  name: page
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1

PerPage:
  name: per_page
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 15

Id:
  name: id
  in: path
  required: true
  schema:
    type: integer
    minimum: 1
